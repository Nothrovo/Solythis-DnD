<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurelion — Scene Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cinzel+Decorative:wght@700&family=Lora:ital,wght@0,500;1,400&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js" onerror="window.io=undefined"></script>
    <script src="../../sync-client.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --gold-dim: rgba(212,175,55,0.55);
            --gold-glow: rgba(212,175,55,0.25);
            --bg: #07080f;
            --panel-bg: rgba(8, 10, 20, 0.96);
            --text: #e2e8f0;
            --muted: #64748b;
            --thumb-h: 90px;
            --strip-collapsed-h: 44px;      /* height when closed — shows just the tab bar */
            --strip-open-h: 160px;           /* height when open — tab + thumbs */
            --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── SLIDESHOW ─────────────────────────── */
        #slideshow { position: fixed; inset: 0; z-index: 0; }

        .slide {
            position: absolute; inset: 0;
            opacity: 0; pointer-events: none;
            transition: opacity 0.65s cubic-bezier(0.4,0,0.2,1);
        }
        .slide.active { opacity: 1; pointer-events: all; }
        .slide.prev-out { opacity: 0; transition: opacity 0.4s ease-in; }

        .slide-img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover; object-position: center;
            display: block;
        }
        .slide::after {
            content: '';
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%),
                linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, transparent 22%, transparent 68%, rgba(0,0,0,0.7) 100%);
            pointer-events: none;
        }

        /* ─── TOP BAR ───────────────────────────── */
        #topBar {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 1rem 1.5rem;
            background: linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, transparent 100%);
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        #topBar.ui-hidden { opacity: 0; }

        .top-brand {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.1rem; color: var(--gold);
            letter-spacing: 0.08em;
            text-shadow: 0 0 20px rgba(212,175,55,0.5);
        }
        .top-scene-label {
            font-family: 'Cinzel', serif; font-size: 0.82rem;
            color: rgba(255,255,255,0.6); letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .top-counter {
            font-family: 'Cinzel', serif; font-size: 0.82rem;
            color: rgba(255,255,255,0.5); letter-spacing: 0.08em;
        }

        /* ─── SCENE TITLE CARD (bottom-left) ──────── */
        #sceneTitleCard {
            position: fixed;
            bottom: calc(var(--strip-collapsed-h) + 1.4rem);
            left: 2rem;
            z-index: 100; pointer-events: none;
            transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.4,0,0.2,1), bottom 0.35s cubic-bezier(0.4,0,0.2,1);
        }
        #sceneTitleCard.ui-hidden { opacity: 0; transform: translateY(10px); }
        #sceneTitleCard.strip-open { bottom: calc(var(--strip-open-h) + 1rem); }
        #sceneTitleCard.entering { animation: titleEnter 0.6s cubic-bezier(0.4,0,0.2,1) forwards; }

        @keyframes titleEnter {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .title-chapter {
            font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 700;
            color: var(--gold); letter-spacing: 0.22em; text-transform: uppercase;
            margin-bottom: 0.3rem; text-shadow: 0 1px 6px rgba(0,0,0,0.9);
        }
        .title-scene {
            font-family: 'Lora', serif; font-style: italic;
            font-size: 1.75rem; color: #fff;
            text-shadow: 0 2px 14px rgba(0,0,0,0.95); line-height: 1.2;
        }
        .title-divider {
            width: 44px; height: 2px; background: var(--gold);
            margin-top: 0.55rem; box-shadow: 0 0 8px var(--gold-glow);
        }

        /* ─── PREV / NEXT ARROWS ─────────────────── */
        .nav-arrow {
            position: fixed; top: 50%; transform: translateY(-50%);
            z-index: 150;
            width: 52px; height: 88px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.38);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            cursor: pointer; color: rgba(255,255,255,0.75);
            transition: var(--transition);
        }
        #prevArrow { left: 0; border-radius: 0 12px 12px 0; border-left: none; }
        #nextArrow { right: 0; border-radius: 12px 0 0 12px; border-right: none; }
        .nav-arrow:hover {
            background: rgba(212,175,55,0.16);
            border-color: var(--gold-dim); color: var(--gold); width: 62px;
        }
        .nav-arrow svg { width: 24px; height: 24px; fill: currentColor; }
        .nav-arrow.ui-hidden { opacity: 0; pointer-events: none; }
        .nav-arrow.disabled { opacity: 0.18; pointer-events: none; }

        /* ─── BOTTOM DRAWER ──────────────────────── */
        #bottomDrawer {
            position: fixed; bottom: 0; left: 0; right: 0;
            z-index: 200;
            transition: height 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
            height: var(--strip-collapsed-h);
            overflow: hidden;
        }
        #bottomDrawer.open { height: var(--strip-open-h); }
        #bottomDrawer.ui-hidden { opacity: 0; pointer-events: none; }

        #bottomDrawer::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(4,5,12,0.97) 0%, rgba(4,5,12,0.92) 60%, rgba(4,5,12,0.5) 100%);
            backdrop-filter: blur(12px);
        }

        .drawer-tab-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: var(--strip-collapsed-h);
            display: flex; align-items: center;
            padding: 0 0.75rem;
            gap: 0.4rem;
            border-top: 1px solid rgba(212,175,55,0.12);
        }

        .tab-btn {
            display: flex; align-items: center; gap: 0.45rem;
            padding: 0.3rem 0.85rem;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            cursor: pointer;
            color: var(--muted);
            font-family: 'Cinzel', serif;
            font-size: 0.72rem; font-weight: 700;
            letter-spacing: 0.08em;
            transition: var(--transition);
            white-space: nowrap;
        }
        .tab-btn:hover {
            background: rgba(255,255,255,0.07);
            color: var(--text);
            border-color: rgba(255,255,255,0.18);
        }
        .tab-btn.active-chapter {
            border-color: var(--tab-color, var(--gold-dim));
            color: var(--tab-color, var(--gold));
            background: rgba(212,175,55,0.06);
            box-shadow: 0 0 8px rgba(212,175,55,0.1);
        }
        .tab-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--tab-color, var(--gold-dim));
            flex-shrink: 0;
        }

        .tab-spacer { flex: 1; }

        .tab-progress {
            display: flex; gap: 3px; align-items: center;
        }
        .tdot {
            width: 5px; height: 5px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: background 0.2s, transform 0.2s;
            cursor: pointer;
        }
        .tdot.active {
            background: var(--tab-color, var(--gold));
            transform: scale(1.3);
        }

        .drawer-toggle-btn {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            color: var(--muted);
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .drawer-toggle-btn:hover { color: var(--gold); border-color: var(--gold-dim); background: rgba(212,175,55,0.08); }
        .drawer-toggle-btn svg { width: 16px; height: 16px; fill: currentColor; transition: transform 0.35s; }
        #bottomDrawer.open .drawer-toggle-btn svg { transform: rotate(180deg); }

        .drawer-content {
            position: absolute; top: 0; left: 0; right: 0;
            bottom: var(--strip-collapsed-h);
            display: flex; align-items: center;
            padding: 0.7rem 1rem;
            gap: 0.55rem;
            overflow-x: auto; overflow-y: hidden;
            scrollbar-width: thin;
            scrollbar-color: rgba(212,175,55,0.2) transparent;
        }
        .drawer-content::-webkit-scrollbar { height: 3px; }
        .drawer-content::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.2); border-radius: 2px; }

        .thumb-item {
            flex-shrink: 0;
            width: calc(var(--thumb-h) * 16/9);
            height: var(--thumb-h);
            position: relative;
            cursor: pointer; border-radius: 7px; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
            transition: var(--transition);
            opacity: 0.5;
        }
        .thumb-item:hover { opacity: 0.82; transform: translateY(-3px); border-color: rgba(255,255,255,0.28); }
        .thumb-item.active {
            opacity: 1; border-color: var(--gold);
            box-shadow: 0 0 16px var(--gold-glow), 0 -3px 0 var(--gold);
            transform: translateY(-4px);
        }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .thumb-label {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.82));
            padding: 0.35rem 0.4rem 0.28rem;
            font-family: 'Cinzel', serif; font-size: 0.56rem; font-weight: 700;
            color: #fff; letter-spacing: 0.06em; text-transform: uppercase;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .thumb-item.active .thumb-label { color: var(--gold); }

        #hudToggle {
            position: fixed; top: 1rem; right: 1rem; z-index: 300;
            width: 34px; height: 34px;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.45); backdrop-filter: blur(8px);
            transition: var(--transition);
        }
        #hudToggle:hover { border-color: var(--gold-dim); color: var(--gold); background: rgba(212,175,55,0.1); }
        #hudToggle svg { width: 15px; height: 15px; fill: currentColor; }

        #progressBar {
            position: fixed; top: 0; left: 0; height: 2px;
            background: var(--gold); box-shadow: 0 0 8px var(--gold);
            z-index: 999; transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
        }

        #autoplayIndicator {
            position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
            z-index: 300; background: rgba(0,0,0,0.72);
            border: 1px solid var(--gold-dim); border-radius: 20px;
            padding: 0.28rem 1rem;
            font-family: 'Cinzel', serif; font-size: 0.72rem;
            color: var(--gold); letter-spacing: 0.1em;
            display: none; align-items: center; gap: 0.5rem;
            backdrop-filter: blur(8px);
        }
        #autoplayIndicator.visible { display: flex; }
        .auto-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--gold); animation: autoPulse 1s infinite;
        }
        @keyframes autoPulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

        /* ─── PLACE GALLERY ─── */
        #placeGalleryView {
            position: absolute; inset: 0; z-index: 10;
            overflow-y: auto; padding: 2.5rem 2rem;
            background: radial-gradient(circle at 50% 30%, #111326 0%, #07080f 80%);
            display: flex; flex-direction: column; align-items: center;
        }
        .gallery-header {
            width: 100%; max-width: 1200px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 2.5rem; border-bottom: 1px solid rgba(212,175,55,0.2);
            padding-bottom: 1.2rem;
        }
        .gallery-title {
            font-family: 'Cinzel Decorative', serif; font-size: 2rem;
            color: var(--gold); text-shadow: 0 0 15px rgba(212,175,55,0.3);
            text-align: center; flex: 1; margin: 0 1.5rem;
        }
        .dash-back-btn, .back-to-gallery-btn {
            font-family: inherit; font-size: 0.8rem; font-weight: 600;
            color: #f3e5ab; text-decoration: none; padding: 6px 16px;
            border: 1px solid rgba(212,175,55,0.25); border-radius: 999px;
            background: rgba(212,175,55,0.1); display: inline-flex;
            align-items: center; gap: 6px; transition: var(--transition);
            white-space: nowrap; cursor: pointer;
        }
        .dash-back-btn:hover, .back-to-gallery-btn:hover {
            background: var(--gold); color: #07090e; border-color: var(--gold);
            box-shadow: 0 0 12px rgba(212,175,55,0.4);
        }
        .gold-action-btn {
            font-family: 'Cinzel', serif; font-size: 0.82rem; font-weight: 700;
            color: #07090e; background: var(--gold); border: 1px solid var(--gold);
            border-radius: 6px; padding: 7px 18px; cursor: pointer;
            box-shadow: 0 0 10px rgba(212,175,55,0.2); transition: var(--transition);
            letter-spacing: 0.05em;
        }
        .gold-action-btn:hover {
            background: #fff; border-color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }
        .gold-action-btn-sm {
            font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 700;
            color: #07090e; background: var(--gold); border: 1px solid var(--gold);
            border-radius: 5px; padding: 4px 12px; cursor: pointer;
            transition: var(--transition); letter-spacing: 0.05em;
        }
        .gold-action-btn-sm:hover {
            background: #fff; border-color: #fff;
        }

        .gallery-grid {
            width: 100%; max-width: 1200px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 2rem; padding-bottom: 3rem;
        }

        .place-card {
            background: rgba(13, 16, 33, 0.65);
            border: 1px solid rgba(212,175,55,0.18);
            border-radius: 12px; overflow: hidden; cursor: pointer;
            position: relative; height: 180px;
            transition: var(--transition);
            display: flex; flex-direction: column; justify-content: flex-end;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
        }
        .place-card-img {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; object-position: center; filter: brightness(0.55);
            transition: var(--transition);
        }
        .place-card:hover {
            transform: translateY(-6px);
            border-color: var(--gold);
            box-shadow: 0 12px 30px rgba(212,175,55,0.22), 0 0 15px rgba(212,175,55,0.1);
        }
        .place-card:hover .place-card-img {
            transform: scale(1.08); filter: brightness(0.7);
        }
        .place-card-name {
            font-family: 'Cinzel', serif; font-size: 1.25rem; font-weight: 700;
            color: #fff; letter-spacing: 0.08em; text-align: center;
            z-index: 2; padding: 1.2rem;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 1px 2px rgba(212,175,55,0.3);
            border-top: 1px solid rgba(255,255,255,0.05);
            background: linear-gradient(to top, rgba(7,9,19,0.92) 0%, rgba(7,9,19,0.4) 60%, transparent 100%);
        }

        .add-place-card {
            background: rgba(255,255,255,0.02);
            border: 2px dashed rgba(212,175,55,0.25);
            border-radius: 12px; height: 180px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 0.8rem; transition: var(--transition);
        }
        .add-place-card:hover {
            background: rgba(212,175,55,0.05);
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212,175,55,0.15);
        }
        .add-place-card svg {
            width: 38px; height: 38px; color: var(--gold-dim);
            transition: var(--transition);
        }
        .add-place-card:hover svg {
            color: var(--gold); transform: scale(1.1);
        }
        .add-place-label {
            font-family: 'Cinzel', serif; font-size: 0.95rem; font-weight: 700;
            color: var(--gold-dim); letter-spacing: 0.05em; transition: var(--transition);
        }
        .add-place-card:hover .add-place-label {
            color: var(--gold);
        }

        /* ─── MODALS ─── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.78);
            z-index: 10000; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(6px); transition: opacity 0.3s ease;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: rgba(8, 10, 20, 0.98);
            border: 1px solid var(--gold-dim);
            border-radius: 10px; padding: 2rem; width: 420px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9), 0 0 20px rgba(212,175,55,0.15);
        }
        .modal-title {
            font-family: 'Cinzel', serif; font-size: 1.25rem; font-weight: 700;
            color: var(--gold); border-bottom: 1px solid rgba(212,175,55,0.25);
            padding-bottom: 0.6rem; margin-bottom: 1.2rem; text-align: center;
            letter-spacing: 0.08em;
        }
        .modal-label {
            font-size: 0.72rem; color: var(--muted); font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem;
        }
        .modal-input {
            width: 100%; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
            color: #fff; padding: 0.6rem 0.8rem; font-size: 0.88rem;
            margin-bottom: 1.2rem; outline: none; transition: var(--transition);
        }
        .modal-input:focus {
            border-color: var(--gold); background: rgba(255,255,255,0.06);
            box-shadow: 0 0 8px var(--gold-glow);
        }
        .file-upload-row {
            display: flex; gap: 0.8rem; align-items: center; margin-bottom: 1.2rem;
        }
        .modal-btn {
            font-family: inherit; font-size: 0.78rem; font-weight: 600;
            color: #fff; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
            padding: 6px 14px; cursor: pointer; transition: var(--transition);
        }
        .modal-btn:hover {
            background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25);
        }
        .file-name-span {
            font-size: 0.75rem; color: var(--muted);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px;
        }
        .modal-actions {
            display: flex; justify-content: flex-end; gap: 0.8rem; margin-top: 0.5rem;
        }
        .modal-ok {
            font-family: 'Cinzel', serif; font-size: 0.78rem; font-weight: 700;
            color: #07090e; background: var(--gold); border: 1px solid var(--gold);
            border-radius: 5px; padding: 6px 18px; cursor: pointer;
            transition: var(--transition);
        }
        .modal-ok:hover {
            background: #fff; border-color: #fff;
        }
        .modal-cancel {
            font-family: 'Cinzel', serif; font-size: 0.78rem; font-weight: 700;
            color: var(--muted); background: transparent; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 5px; padding: 6px 18px; cursor: pointer;
            transition: var(--transition);
        }
        .modal-cancel:hover {
            color: #fff; border-color: rgba(255,255,255,0.3);
        }

        /* ─── THUMBNAIL DELETE & DRAGGING ─── */
        .thumb-item {
            position: relative;
        }
        .thumb-delete-btn {
            position: absolute; top: 4px; right: 4px; z-index: 5;
            width: 18px; height: 18px; border-radius: 50%;
            background: rgba(220, 38, 38, 0.85); border: 1px solid rgba(255,255,255,0.25);
            color: #fff; font-size: 0.72rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; transition: var(--transition);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            padding-bottom: 2px;
        }
        .thumb-item:hover .thumb-delete-btn { opacity: 1; }
        .thumb-delete-btn:hover { background: rgb(220, 38, 38); transform: scale(1.15); }

        .thumb-item.dragging {
            opacity: 0.3;
            border: 2px dashed var(--gold);
        }
    </style>
</head>
<body>
    <!-- ─── PLACE GALLERY VIEW ─── -->
    <div id="placeGalleryView">
        <header class="gallery-header">
            <a href="../../dashboard.html" style="font-family:inherit;font-size:0.78rem;font-weight:600;color:#f3e5ab;text-decoration:none;padding:5px 14px;border:1px solid rgba(212,175,55,0.25);border-radius:999px;background:rgba(212,175,55,0.1);display:inline-flex;align-items:center;gap:6px;transition:all 0.25s;white-space:nowrap;" onmouseover="this.style.background='#d4af37';this.style.color='#07090e';this.style.borderColor='#d4af37'" onmouseout="this.style.background='rgba(212,175,55,0.1)';this.style.color='#f3e5ab';this.style.borderColor='rgba(212,175,55,0.25)'">← Dashboard</a>
            <h1 class="gallery-title">Aurelion Lore Scenes</h1>
            <button class="gold-action-btn" onclick="openAddPlaceModal()">+ Tambah Tempat</button>
        </header>
        <div class="gallery-grid" id="placesGrid">
            <!-- Place cards injected by JS -->
        </div>
    </div>

    <!-- ─── SCENE VIEWER CONTAINER ─── -->
    <div id="sceneViewContainer" style="display: none;">
        <div id="progressBar"></div>

                <!-- subcategory tabs (Bangunan, Orang, Scene) injected by JS -->

                <button class="drawer-toggle-btn" id="drawerToggleBtn" onclick="toggleDrawer()" title="Buka/tutup scene panel">
                    <svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- ─── MODALS ─── -->
    <!-- Modal Tambah Tempat -->
    <div class="modal-overlay" id="addPlaceModal">
        <div class="modal-box">
            <div class="modal-title">🏰 Tambah Tempat Baru</div>
            <div class="modal-label">Nama Tempat</div>
            <input type="text" class="modal-input" id="newPlaceName" placeholder="Cth: Greymere, Slums..." maxlength="32">
            
            <div class="modal-label">Gambar Sampul (Opsional)</div>

                <button class="modal-btn" onclick="document.getElementById('placeCoverFile').click()">📁 Pilih File Gambar</button>

            <input type="file" id="placeCoverFile" accept="image/*" style="display:none;" onchange="handlePlaceCoverUpload(event)">

    <!-- Modal Tambah Scene/Gambar -->
    <div class="modal-overlay" id="addSceneModal">
        <div class="modal-box">
            <div class="modal-title">🌅 Tambah Gambar Baru</div>
            
            <div class="modal-label">Sub-Kategori</div>
            <select class="modal-input" id="newSceneCategory" style="background:#0d0f1a; color:#fff;">
                <option value="scene">Scene (Umum / Lanskap)</option>
                <option value="bangunan">Bangunan (Lokasi / Ruangan)</option>

                <option value="map">Map (Peta / Denah)</option>
            </select>

            <div class="modal-label">Judul Gambar / Scene</div>
            <input type="text" class="modal-input" id="newSceneTitle" placeholder="Cth: Panti Asuhan, Irelia, Slum Alley..." maxlength="48">

            <div class="modal-label">File Gambar</div>
            <div class="file-upload-row">
                <button class="modal-btn" onclick="document.getElementById('sceneImgFile').click()">📁 Pilih File Gambar</button>
                <span id="sceneImgName" class="file-name-span">Tidak ada file</span>
            </div>
            <input type="file" id="sceneImgFile" accept="image/*" style="display:none;" onchange="handleSceneImgUpload(event)">
            
            <div class="modal-actions">
                <button class="modal-ok" onclick="saveNewScene()">Simpan</button>
                <button class="modal-cancel" onclick="closeAddSceneModal()">Batal</button>

    </div>

    <script>
    'use strict';

    const DB_NAME = 'SceneViewerDB';
    const DB_VERSION = 1;
    let db = null;

    // Default static data for first-time setup
    const DEFAULT_PLACES = [
        { name: 'Pre-Highspire', cover: 'Scenes/PreHighspire.png' },
        { name: 'Highspire',     cover: 'Scenes/Highspire1.png' },
        { name: 'Breckenford',   cover: 'Scenes/Breckenford1.png' },
        { name: 'Old Battlefield', cover: 'Scenes/OldBattlefield1.png' }
    ];

    const DEFAULT_SCENES = [
        { place: 'Pre-Highspire', category: 'scene', file: 'Scenes/PreHighspire.png',  label: 'Scene 1', sceneTitle: 'Sebelum Highspire' },
        { place: 'Highspire',     category: 'scene', file: 'Scenes/Highspire1.png',       label: 'Scene 1', sceneTitle: 'Kota Highspire' },
        { place: 'Highspire',     category: 'scene', file: 'Scenes/Highspire2.png',       label: 'Scene 2', sceneTitle: 'Jalan Highspire' },
        { place: 'Highspire',     category: 'scene', file: 'Scenes/Highspire3.png',       label: 'Scene 3', sceneTitle: 'Guild Kerajaan' },
        { place: 'Highspire',     category: 'scene', file: 'Scenes/Highspire4.png',       label: 'Scene 4', sceneTitle: 'Keberangkatan' },
        { place: 'Breckenford',   category: 'scene', file: 'Scenes/Breckenford1.png',     label: 'Scene 1', sceneTitle: 'Desa Breckenford' },
        { place: 'Breckenford',   category: 'scene', file: 'Scenes/Breckenford2.png',     label: 'Scene 2', sceneTitle: 'Penginapan Tua' },
        { place: 'Breckenford',   category: 'scene', file: 'Scenes/Breckenford3.png',     label: 'Scene 3', sceneTitle: 'Para Veteran' },
        { place: 'Breckenford',   category: 'scene', file: 'Scenes/Breckenford4.png',     label: 'Scene 4', sceneTitle: 'Catatan Berdarah' },
        { place: 'Breckenford',   category: 'scene', file: 'Scenes/Breckenford5.png',     label: 'Scene 5', sceneTitle: 'Peninggalan Perang' },
        { place: 'Old Battlefield',category: 'scene', file: 'Scenes/OldBattlefield1.png',  label: 'Scene 1', sceneTitle: 'Hutan Bekas Perang' }
    ];

    const CATEGORY_COLORS = {
        'scene':    '#d4af37', // Gold
        'bangunan': '#8fba6e', // Green
        'orang':    '#9b7de8', // Violet
        'map':      '#38bdf8'  // Sky Blue
    };

    // State
    let activeView      = 'gallery'; // 'gallery' | 'viewer'
    let activePlace     = null;      // name of active place
    let activeCategory  = 'scene';   // 'scene' | 'bangunan' | 'orang' | 'map'
    let placesList      = [];
    let scenesList      = [];        // all scenes from DB
    let filteredScenes  = [];        // scenes filtered by activePlace & activeCategory
    let currentIdx      = 0;
    let hudVisible      = true;
    let drawerOpen      = false;
    let autoplayTimer   = null;
    const AUTOPLAY_DELAY = 6000;

    // Temporary upload variables
    let tempPlaceCoverBase64 = null;
    let tempSceneImgBase64   = null;

    // ══════════════════════════════════════════
    //   INDEXEDDB INITIALIZATION
    // ══════════════════════════════════════════
    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('places')) {
                    db.createObjectStore('places', { keyPath: 'name' });
                }
                if (!db.objectStoreNames.contains('scenes')) {
                    db.createObjectStore('scenes', { keyPath: 'id', autoIncrement: true });
                }
            };
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
        });
    }

    async function loadData() {
        try {
            db = await initDB();
            
            // Fetch places
            let dbPlaces = await getStoreData('places');
            let dbScenes = await getStoreData('scenes');

            // Pre-populate if empty
            if (dbPlaces.length === 0) {
                for (const p of DEFAULT_PLACES) {
                    await saveToStore('places', p);
                }
                dbPlaces = await getStoreData('places');
            }
            if (dbScenes.length === 0) {
                for (const s of DEFAULT_SCENES) {
                    await saveToStore('scenes', s);
                }
                dbScenes = await getStoreData('scenes');
            }

            placesList = dbPlaces;
            scenesList = dbScenes;

            renderPlaceGallery();
        } catch (e) {
            console.error('Database load error:', e);
        }
    }

    function getStoreData(storeName) {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(storeName, 'readonly');
            const store = transaction.objectStore(storeName);
            const request = store.getAll();
            request.onsuccess = () => {
                let result = request.result;
                if (storeName === 'scenes') {
                    result.sort((a, b) => (a.order || 0) - (b.order || 0));
                }
                resolve(result);
            };
            request.onerror = () => reject(request.error);
        });
    }

    function saveToStore(storeName, item) {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(storeName, 'readwrite');
            const store = transaction.objectStore(storeName);
            const request = store.put(item);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    function deleteFromStore(storeName, key) {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(storeName, 'readwrite');
            const store = transaction.objectStore(storeName);
            const request = store.delete(key);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    // ══════════════════════════════════════════
    //   DOM CONTENT LOADED
    // ══════════════════════════════════════════
    window.addEventListener('DOMContentLoaded', () => {
        loadData();
        setupKeyboard();
        initSceneSync();
    });

    // ══════════════════════════════════════════
    //   RENDERERS & INTERACTIVE LOGIC
    // ══════════════════════════════════════════
    function renderPlaceGallery() {
        const grid = document.getElementById('placesGrid');
        grid.innerHTML = '';

        placesList.forEach(p => {
            const card = document.createElement('div');
            card.className = 'place-card';
            card.onclick = () => openPlaceViewer(p.name);
            
            let imgHtml = '';
            if (p.cover) {
                imgHtml = `<img src="${p.cover}" class="place-card-img" alt="${p.name}">`;
            } else {
                // Look for the first scene of this place as cover
                const firstScene = scenesList.find(s => s.place === p.name);
                if (firstScene) {
                    imgHtml = `<img src="${firstScene.file}" class="place-card-img" alt="${p.name}">`;
                } else {
                    // Default dark gold placeholder gradient
                    imgHtml = `<div class="place-card-img" style="background:linear-gradient(135deg, #11142b 0%, #07090e 100%);"></div>`;
                }
            }

            card.innerHTML = `
                ${imgHtml}
                <div class="place-card-name">${p.name}</div>
            `;
            grid.appendChild(card);
        });

        // Add Place card
        const addCard = document.createElement('div');
        addCard.className = 'add-place-card';
        addCard.onclick = openAddPlaceModal;
        addCard.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            <div class="add-place-label">Tambah Tempat</div>
        `;
        grid.appendChild(addCard);
    }

    function openPlaceViewer(placeName) {
        activePlace = placeName;
        activeView = 'viewer';
        activeCategory = 'scene';

        document.getElementById('placeGalleryView').style.display = 'none';
        document.getElementById('sceneViewContainer').style.display = 'block';
        
        document.getElementById('topBrandName').textContent = placeName;

        const scenesInCat = scenesList.filter(s => s.place === placeName && s.category === activeCategory);
        filteredScenes = scenesInCat;

        buildSubCategoryTabs();
        buildThumbs();
        buildSlides();

        if (filteredScenes.length > 0) {
            goTo(0, false);
        } else {
            switchCategory('scene');
        }
    }

    function closePlaceViewer() {
        activeView = 'gallery';
        activePlace = null;
        
        // Stop autoplay if running
        if (autoplayTimer) {
            toggleAutoplay();
        }

        document.getElementById('placeGalleryView').style.display = 'flex';
        document.getElementById('sceneViewContainer').style.display = 'none';
        
        // Reset slideshow container
        document.getElementById('slideshow').innerHTML = '';
        document.getElementById('drawerContent').innerHTML = '';
    }

    // ── Sub-Category Tabs ──────────────────────────
    function buildSubCategoryTabs() {
        const bar = document.getElementById('tabBar');
        const spacer = bar.querySelector('.tab-spacer');
        
        // Remove existing tab buttons
        const existingTabs = bar.querySelectorAll('.tab-btn');
        existingTabs.forEach(t => t.remove());

        const categories = [
            { id: 'scene',    label: '🌅 Scene',    color: CATEGORY_COLORS.scene },
            { id: 'bangunan', label: '🏛 Bangunan', color: CATEGORY_COLORS.bangunan },
            { id: 'orang',    label: '👥 Orang',    color: CATEGORY_COLORS.orang },
            { id: 'map',      label: '🗺 Map',       color: CATEGORY_COLORS.map }
        ];

        categories.forEach(cat => {
            const scenesInCat = scenesList.filter(s => s.place === activePlace && s.category === cat.id);
            
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            if (activeCategory === cat.id) btn.classList.add('active-chapter');
            btn.style.setProperty('--tab-color', cat.color);

            // Progress dots
            const dotsHtml = scenesInCat.map((s, di) =>
                `<span class="tdot" data-category="${cat.id}" data-di="${di}" title="${s.sceneTitle}"></span>`
            ).join('');

            btn.innerHTML = `<span class="tab-dot"></span>${cat.label}<span class="tab-progress">${dotsHtml}</span>`;

            btn.addEventListener('click', () => {
                if (activeCategory !== cat.id) {
                    switchCategory(cat.id);
                } else {
                    toggleDrawer();
                }
            });

            // Dot clicks
            btn.querySelectorAll('.tdot').forEach((dot, di) => {
                dot.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (activeCategory !== cat.id) {
                        activeCategory = cat.id;
                        buildSubCategoryTabs();
                        buildThumbs();
                        buildSlides();
                        goTo(di);
                    } else {
                        goTo(di);
                    }
                });
            });

            bar.insertBefore(btn, spacer);
        });
    }

    function switchCategory(catId) {
        activeCategory = catId;
        const scenesInCat = scenesList.filter(s => s.place === activePlace && s.category === catId);
        filteredScenes = scenesInCat;
        
        buildSubCategoryTabs();
        buildThumbs();
        buildSlides();
        
        if (filteredScenes.length > 0) {
            goTo(0, false);
        } else {
            const ss = document.getElementById('slideshow');
            ss.innerHTML = '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:\'Cinzel\',serif;font-size:1.2rem;background:#05070e;">Belum ada gambar di kategori ini.</div>';
            document.getElementById('topSceneLabel').textContent = '';
            document.getElementById('topCounter').textContent = '0 / 0';
            document.getElementById('titleChapter').textContent = '';
            document.getElementById('titleScene').textContent = 'Kategori Kosong';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('prevArrow').classList.add('disabled');
            document.getElementById('nextArrow').classList.add('disabled');
        }
    }

    // ── Thumbnails ───────────────────────────────
    function buildThumbs() {
        const content = document.getElementById('drawerContent');
        content.innerHTML = ''; // Clear previous thumbs
        
        filteredScenes.forEach((scene, i) => {
            const item = document.createElement('div');
            item.className = 'thumb-item';
            item.id = `thumb-${i}`;
            item.title = `${scene.place} — ${scene.label}: ${scene.sceneTitle}`;
            item.draggable = true;
            item.innerHTML = `
                <img class="thumb-img" src="${scene.file}" alt="" loading="lazy">
                <div class="thumb-label">${scene.sceneTitle}</div>
                <button class="thumb-delete-btn" title="Hapus Scene">&times;</button>
            `;
            
            item.addEventListener('click', (e) => {
                if (e.target.classList.contains('thumb-delete-btn')) return;
                goTo(i);
                closeDrawer();
            });

            const delBtn = item.querySelector('.thumb-delete-btn');
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteSceneItem(scene.id, scene.sceneTitle);
            });

            // Drag and Drop
            item.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', i);
                item.classList.add('dragging');
            });

            item.addEventListener('dragend', () => {
                item.classList.remove('dragging');
            });

            item.addEventListener('dragover', (e) => {
                e.preventDefault();
            });

            item.addEventListener('dragenter', (e) => {
                e.preventDefault();
                item.style.borderColor = 'var(--gold)';
                item.style.transform = 'translateY(-2px)';
            });

            item.addEventListener('dragleave', () => {
                item.style.borderColor = '';
                item.style.transform = '';
            });

            item.addEventListener('drop', (e) => {
                e.preventDefault();
                item.style.borderColor = '';
                item.style.transform = '';
                const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
                const toIdx = i;
                if (fromIdx !== toIdx) {
                    reorderScenes(fromIdx, toIdx);
                }
            });

            content.appendChild(item);
        });
    }

    async function deleteSceneItem(id, title) {
        if (!confirm(`Hapus gambar "${title}"?`)) return;
        try {
            await deleteFromStore('scenes', id);
            scenesList = await getStoreData('scenes');
            switchCategory(activeCategory);
        } catch (e) {
            console.error('Failed to delete scene:', e);
        }
    }

    async function reorderScenes(fromIdx, toIdx) {
        const movedItem = filteredScenes.splice(fromIdx, 1)[0];
        filteredScenes.splice(toIdx, 0, movedItem);

        filteredScenes.forEach((s, idx) => {
            s.order = idx;
        });

        try {
            for (const s of filteredScenes) {
                await saveToStore('scenes', s);
            }
            scenesList = await getStoreData('scenes');
            
            buildSubCategoryTabs();
            buildThumbs();
            buildSlides();
            goTo(toIdx, false);
        } catch (e) {
            console.error('Failed to save reordered scenes:', e);
        }
    }

    // ── Slides ──────────────────────────────────
    function buildSlides() {
        const ss = document.getElementById('slideshow');
        ss.innerHTML = ''; // Clear previous slides
        filteredScenes.forEach((scene, i) => {
            const div = document.createElement('div');
            div.className = 'slide';
            div.id = `slide-${i}`;
            const img = document.createElement('img');
            img.className = 'slide-img';
            img.src = scene.file;
            img.alt = `${scene.place} — ${scene.label}`;
            img.draggable = false;
            div.addEventListener('click', (e) => {
                if (e.target === div || e.target === img) {
                    if (drawerOpen) { closeDrawer(); return; }
                    navigate(+1);
                }
            });
            div.appendChild(img);
            ss.appendChild(div);
        });
    }

    // ══════════════════════════════════════════
    //   NAVIGATION
    // ══════════════════════════════════════════
    function goTo(idx, animate = true) {
        if (idx < 0 || idx >= filteredScenes.length) return;
        const prev = currentIdx;
        currentIdx = idx;
        const scene = filteredScenes[idx];
        const color = CATEGORY_COLORS[scene.category] || 'var(--gold)';

        // Slides
        document.querySelectorAll('.slide').forEach((el, i) => {
            if (i === idx) { el.classList.add('active'); }
            else {
                if (i === prev && animate) {
                    el.classList.add('prev-out');
                    setTimeout(() => el.classList.remove('prev-out'), 500);
                }
                el.classList.remove('active');
            }
        });

        // Thumbnails
        document.querySelectorAll('.thumb-item').forEach((el, i) => {
            el.classList.toggle('active', i === idx);
        });
        document.getElementById(`thumb-${idx}`)?.scrollIntoView({ inline:'center', behavior:'smooth', block:'nearest' });

        // Tab progress dots
        const tabBtn = document.querySelector(`.tab-btn.active-chapter`);
        if (tabBtn) {
            const dots = tabBtn.querySelectorAll('.tdot');
            dots.forEach((dot, di) => {
                dot.classList.toggle('active', di === idx);
            });
        }

        // Top bar
        document.getElementById('topSceneLabel').textContent = `${scene.category.toUpperCase()}  ·  ${scene.label}`;
        document.getElementById('topCounter').textContent = `${idx + 1} / ${filteredScenes.length}`;

        // Title card
        const tc = document.getElementById('sceneTitleCard');
        document.getElementById('titleChapter').textContent = scene.place;
        document.getElementById('titleChapter').style.color = color;
        document.getElementById('titleScene').textContent = scene.sceneTitle;
        if (animate) {
            tc.classList.remove('entering');
            void tc.offsetWidth;
            tc.classList.add('entering');
        }

        // Arrows
        document.getElementById('prevArrow').classList.toggle('disabled', idx === 0);
        document.getElementById('nextArrow').classList.toggle('disabled', idx === filteredScenes.length - 1);

        // Progress bar
        document.getElementById('progressBar').style.width =
            filteredScenes.length > 1 ? ((idx / (filteredScenes.length - 1)) * 100) + '%' : '100%';

        // Broadcast scene change if we are DM and not currently applying an incoming sync
        if (typeof SolSync !== 'undefined' && SolSync.isOnline && SolSync.getPlayerRole() === 'dm' && !_syncReceivingScene) {
            SolSync.emit('scene:change', {
                place: activePlace,
                category: activeCategory,
                idx: idx,
                sceneTitle: scene.sceneTitle
            });
        }
    }

    function navigate(delta) { goTo(currentIdx + delta); }

    // ══════════════════════════════════════════
    //   DRAWER (bottom panel)
    // ══════════════════════════════════════════
    function toggleDrawer() {
        drawerOpen ? closeDrawer() : openDrawer();
    }
    function openDrawer() {
        drawerOpen = true;
        document.getElementById('bottomDrawer').classList.add('open');
        document.getElementById('sceneTitleCard').classList.add('strip-open');
    }
    function closeDrawer() {
        drawerOpen = false;
        document.getElementById('bottomDrawer').classList.remove('open');
        document.getElementById('sceneTitleCard').classList.remove('strip-open');
    }

    // ══════════════════════════════════════════
    //   HUD TOGGLE
    // ══════════════════════════════════════════
    function toggleHUD() {
        hudVisible = !hudVisible;
        ['topBar','sceneTitleCard','bottomDrawer','prevArrow','nextArrow'].forEach(id =>
            document.getElementById(id)?.classList.toggle('ui-hidden', !hudVisible)
        );
        if (!hudVisible && drawerOpen) closeDrawer();
    }

    // ══════════════════════════════════════════
    //   AUTOPLAY
    // ══════════════════════════════════════════
    function toggleAutoplay() {
        const ind = document.getElementById('autoplayIndicator');
        if (autoplayTimer) {
            clearInterval(autoplayTimer); autoplayTimer = null;
            ind.classList.remove('visible');
        } else {
            autoplayTimer = setInterval(() => {
                currentIdx < filteredScenes.length - 1 ? navigate(+1) : goTo(0);
            }, AUTOPLAY_DELAY);
            ind.classList.add('visible');
        }
    }

    // ══════════════════════════════════════════
    //   FULLSCREEN
    // ══════════════════════════════════════════
    function toggleFullscreen() {
        !document.fullscreenElement
            ? document.documentElement.requestFullscreen()
            : document.exitFullscreen();
    }

    // ══════════════════════════════════════════
    //   MODAL ACTIONS & FILE UPLOADS
    // ══════════════════════════════════════════
    function openAddPlaceModal() {
        document.getElementById('addPlaceModal').classList.add('show');
    }
    function closeAddPlaceModal() {
        document.getElementById('addPlaceModal').classList.remove('show');
    }
    function openAddSceneModal() {
        document.getElementById('addSceneModal').classList.add('show');
    }
    function closeAddSceneModal() {
        document.getElementById('addSceneModal').classList.remove('show');
    }

    function handlePlaceCoverUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('placeCoverName').textContent = file.name;
        
        const reader = new FileReader();
        reader.onload = (evt) => {
            tempPlaceCoverBase64 = evt.target.result;
        };
        reader.readAsDataURL(file);
    }

    function handleSceneImgUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('sceneImgName').textContent = file.name;

        const reader = new FileReader();
        reader.onload = (evt) => {
            tempSceneImgBase64 = evt.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function saveNewPlace() {
        const nameInput = document.getElementById('newPlaceName');
        const name = nameInput.value.trim();
        if (!name) { alert('Nama tempat harus diisi!'); return; }
        
        if (placesList.some(p => p.name.toLowerCase() === name.toLowerCase())) {
            alert('Nama tempat sudah ada!');
            return;
        }

        const newPlace = {
            name: name,
            cover: tempPlaceCoverBase64 || ''
        };

        try {
            await saveToStore('places', newPlace);
            placesList.push(newPlace);
            renderPlaceGallery();
            closeAddPlaceModal();
            
            // Reset modal values
            nameInput.value = '';
            document.getElementById('placeCoverFile').value = '';
            document.getElementById('placeCoverName').textContent = 'Tidak ada file';
            tempPlaceCoverBase64 = null;
        } catch (e) {
            console.error('Error saving place:', e);
        }
    }

    async function saveNewScene() {
        const titleInput = document.getElementById('newSceneTitle');
        const sceneTitle = titleInput.value.trim();
        if (!sceneTitle) { alert('Judul gambar harus diisi!'); return; }
        if (!tempSceneImgBase64) { alert('Pilih file gambar terlebih dahulu!'); return; }

        const category = document.getElementById('newSceneCategory').value;

        // Determine scene label (e.g. Scene 1)
        const scenesInCat = scenesList.filter(s => s.place === activePlace && s.category === category);
        const label = `Scene ${scenesInCat.length + 1}`;

        const newScene = {
            place: activePlace,
            category: category,
            file: tempSceneImgBase64,
            label: label,
            sceneTitle: sceneTitle,
            order: scenesInCat.length
        };

        try {
            await saveToStore('scenes', newScene);
            // Reload all scenes from DB
            scenesList = await getStoreData('scenes');
            
            closeAddSceneModal();

            // Reset modal values
            titleInput.value = '';
            document.getElementById('sceneImgFile').value = '';
            document.getElementById('sceneImgName').textContent = 'Tidak ada file';
            tempSceneImgBase64 = null;

            // Refresh Penampil
            switchCategory(category);
        } catch (e) {
            console.error('Error saving scene:', e);
        }
    }

    // ══════════════════════════════════════════
    //   KEYBOARD
    // ══════════════════════════════════════════
    function setupKeyboard() {
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
            // Disable player keyboard controls if they are supposed to follow the DM
            if (typeof SolSync !== 'undefined' && SolSync.isOnline && SolSync.getPlayerRole() !== 'dm') {
                if (activeView === 'viewer') {
                    // Players can toggle fullscreen/HUD, but not navigate slides
                    if (e.key === 'f' || e.key === 'F') toggleFullscreen();
                    if (e.key === 'h' || e.key === 'H') toggleHUD();
                    return;
                }
            }
            switch (e.key) {
                case 'ArrowLeft':  case 'ArrowUp':    e.preventDefault(); navigate(-1); break;
                case 'ArrowRight': case 'ArrowDown': case ' ': e.preventDefault(); navigate(+1); break;
                case 'h': case 'H': toggleHUD();       break;
                case 'f': case 'F': toggleFullscreen(); break;
                case 'p': case 'P': toggleAutoplay();   break;
                case 'Tab':         e.preventDefault(); toggleDrawer(); break;
                case 'Escape':      
                    if (document.querySelector('.modal-overlay.show')) {
                        closeAddPlaceModal();
                        closeAddSceneModal();
                    } else if (activeView === 'viewer') {
                        closePlaceViewer();
                    }
                    break;
                case 'Home':        e.preventDefault(); goTo(0); break;
                case 'End':         e.preventDefault(); goTo(filteredScenes.length - 1); break;
            }
        });
    }

    // ── SCENE VIEWER SYNC ──
    let _syncReceivingScene = false;
    function initSceneSync() {
        if (typeof SolSync === 'undefined' || !SolSync.isOnline) return;

        // If player is not DM, hide controls (prev/next arrows, drawer, autoplay) to make it pure projector/view-only
        if (SolSync.getPlayerRole() !== 'dm') {
            document.getElementById('prevArrow')?.style.setProperty('display', 'none', 'important');
            document.getElementById('nextArrow')?.style.setProperty('display', 'none', 'important');
            document.getElementById('tabBar')?.style.setProperty('display', 'none', 'important');
            
            // Also register to follow scene changes
            SolSync.on('scene:changed', (data) => {
                applySceneSync(data);
            });
        }

        // Apply state when syncing initial load
        SolSync.on('state:sync', (state) => {
            if (state && state.scene && SolSync.getPlayerRole() !== 'dm') {
                applySceneSync(state.scene);
            }
        });

        // If lastSceneState was cached in combat sync
        if (window._lastSceneState && SolSync.getPlayerRole() !== 'dm') {
            applySceneSync(window._lastSceneState);
        }
    }

    async function applySceneSync(data) {
        if (!data || !data.place) return;
        _syncReceivingScene = true;

        // Ensure database/places are loaded
        if (placesList.length === 0) {
            await loadData();
        }

        if (activePlace !== data.place || activeView !== 'viewer') {
            openPlaceViewer(data.place);
        }

        if (activeCategory !== data.category) {
            switchCategory(data.category);
        }

        if (currentIdx !== data.idx) {
            goTo(data.idx, true);
        }

        _syncReceivingScene = false;
    }
    // ══════════════════════════════════════════
    //   PRESENTATION STATE BRIDGE
    //   Exposes live scene state to scene_presentation.html
    //   (top-level let are not on window — use explicit getter)
    // ══════════════════════════════════════════
    const CATEGORY_COLORS_FOR_PRES = {
        'scene':    '#d4af37',
        'bangunan': '#8fba6e',
        'orang':    '#9b7de8',
        'map':      '#38bdf8'
    };

    window.getScenePresentationState = function() {
        if (activeView !== 'viewer' || filteredScenes.length === 0) return null;
        const scene = filteredScenes[currentIdx];
        if (!scene) return null;
        // Resolve image source — may be a relative file path or a base64 data URL
        const imgSrc = scene.imgData || scene.file || '';
        return {
            place:      scene.place      || '',
            category:   scene.category   || 'scene',
            color:      CATEGORY_COLORS_FOR_PRES[scene.category] || '#d4af37',
            sceneTitle: scene.sceneTitle || '',
            idx:        currentIdx,
            total:      filteredScenes.length,
            imgSrc:     imgSrc
        };
    };

    let scenePresentationWindow = null;
    function openScenePresentation() {
        if (scenePresentationWindow && !scenePresentationWindow.closed) {
            scenePresentationWindow.focus();
            return;
        }
        scenePresentationWindow = window.open(
            'scene_presentation.html',
            'SolythisScenePresentation',
            'width=1280,height=720,menubar=no,toolbar=no,location=no,status=no'
        );
    }
    </script>
</body>
</html>
