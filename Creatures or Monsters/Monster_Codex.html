    <!DOCTYPE html>
    <html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Monster Codex - Solythis D&D</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Outfit:wght@300;400;500;600;700&display=swap');

            :root {
                --bg-dark: #07090e;
                --bg-card: rgba(17, 22, 34, 0.75);
                --bg-sidebar: rgba(10, 13, 20, 0.95);
                --gold-primary: #d4af37;
                --gold-secondary: #f3e5ab;
                --gold-glow: rgba(212, 175, 55, 0.25);
                --text-primary: #f8fafc;
                --text-secondary: #94a3b8;
                --border-gold: rgba(212, 175, 55, 0.2);
                --border-subtle: rgba(255, 255, 255, 0.05);
                
                --dnd-parchment: #fdfaf3;
                --dnd-red: #58180d;
                --dnd-text: #2c1e13;
                --dnd-accent: #8c1e18;
                --dnd-divider: #dcd1b4;
                --dnd-stat-bg: #f3ebd3;
                --dnd-stat-border: #dcd1b4;
            }

            * { box-sizing: border-box; margin: 0; padding: 0; }

            body {
                font-family: 'Outfit', sans-serif;
                background-color: var(--bg-dark);
                background-image: 
                    radial-gradient(at 0% 0%, rgba(212, 175, 55, 0.05) 0px, transparent 50%),
                    radial-gradient(at 50% 0%, rgba(59, 130, 246, 0.03) 0px, transparent 50%),
                    radial-gradient(at 100% 100%, rgba(239, 68, 68, 0.02) 0px, transparent 50%);
                color: var(--text-primary);
                min-height: 100vh;
                display: flex;
                overflow-x: hidden;
                line-height: 1.6;
            }

            ::-webkit-scrollbar { width: 8px; height: 8px; }
            ::-webkit-scrollbar-track { background: var(--bg-dark); }
            ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.2); border-radius: 4px; }
            ::-webkit-scrollbar-thumb:hover { background: rgba(212, 175, 55, 0.4); }

            .app-container { display: flex; width: 100vw; height: 100vh; overflow: hidden; }

            aside {
                width: 320px;
                background: var(--bg-sidebar);
                border-right: 1px solid var(--border-gold);
                padding: 2rem 1.2rem;
                display: flex;
                flex-direction: column;
                height: 100%;
                z-index: 100;
                backdrop-filter: blur(10px);
            }

            .sidebar-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.8rem; padding-left: 0.5rem; }
            .sidebar-header svg { width: 32px; height: 32px; fill: var(--gold-primary); filter: drop-shadow(0 0 8px var(--gold-glow)); }
            .sidebar-title {
                font-family: 'Cinzel', serif;
                font-size: 1.3rem;
                font-weight: 700;
                letter-spacing: 2px;
                background: linear-gradient(135deg, var(--gold-secondary) 0%, var(--gold-primary) 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .search-container { position: relative; margin-bottom: 1.2rem; }
            .search-input {
                width: 100%;
                background: rgba(0, 0, 0, 0.4);
                border: 1px solid var(--border-gold);
                border-radius: 8px;
                padding: 0.75rem 1rem 0.75rem 2.5rem;
                color: var(--text-primary);
                font-family: 'Outfit', sans-serif;
                font-size: 0.95rem;
                outline: none;
                transition: all 0.3s ease;
            }
            .search-input:focus { border-color: var(--gold-primary); box-shadow: 0 0 10px rgba(212, 175, 55, 0.15); background: rgba(0, 0, 0, 0.6); }
            .search-icon { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; fill: var(--text-secondary); pointer-events: none; }

            .alphabet-strip { display: flex; flex-wrap: wrap; gap: 0.25rem; justify-content: space-between; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.8rem; }
            .letter-btn {
                background: transparent; border: none; color: var(--text-secondary);
                font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 700;
                width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
                cursor: pointer; border-radius: 4px; transition: all 0.2s ease;
            }
            .letter-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
            .letter-btn.active { background: var(--gold-primary); color: var(--bg-dark) !important; box-shadow: 0 0 8px var(--gold-glow); }

            .monster-list-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.4rem; padding-right: 0.2rem; }
            .monster-list-item {
                display: flex; align-items: center; justify-content: space-between;
                padding: 0.8rem 1rem;
                background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.02);
                border-radius: 8px; cursor: pointer; transition: all 0.3s ease;
            }
            .monster-list-item:hover { background: rgba(255,255,255,0.03); border-color: rgba(212,175,55,0.1); transform: translateX(4px); }
            .monster-list-item.active { background: rgba(212,175,55,0.08); border-color: rgba(212,175,55,0.35); box-shadow: inset 0 0 10px rgba(212,175,55,0.05); }
            .monster-item-name { font-family: 'Cinzel', serif; font-weight: 700; font-size: 0.95rem; color: var(--text-primary); transition: color 0.3s ease; }
            .monster-list-item.active .monster-item-name { color: var(--gold-secondary); }
            .monster-item-cr { font-size: 0.75rem; background: rgba(255,255,255,0.05); color: var(--text-secondary); padding: 0.15rem 0.4rem; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
            .monster-list-item.active .monster-item-cr { background: rgba(212,175,55,0.15); color: var(--gold-secondary); border-color: rgba(212,175,55,0.2); }
            .no-results { text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-top: 2rem; font-style: italic; }

            main { flex: 1; height: 100%; overflow-y: auto; padding: 2.5rem 3.5rem; position: relative; }
            .codex-page-header { margin-bottom: 2rem; width: 100%; animation: fadeIn 0.4s ease-out; }
            .page-title { font-family: 'Outfit', sans-serif; font-size: 2.6rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.6rem; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
            .red-bar-divider { height: 4px; background-color: var(--dnd-accent); width: 100%; border-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

            .placeholder-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80%; text-align: center; color: var(--text-secondary); animation: fadeIn 0.5s ease; }
            .placeholder-icon { font-size: 4.5rem; margin-bottom: 1.5rem; filter: drop-shadow(0 0 15px rgba(212,175,55,0.2)); animation: pulse 3s infinite ease-in-out; }
            .placeholder-view h2 { font-family: 'Cinzel', serif; color: var(--gold-secondary); letter-spacing: 1px; margin-bottom: 0.5rem; }
            .placeholder-view p { max-width: 450px; font-size: 0.95rem; }

            .loading-view { display: none; flex-direction: column; align-items: center; justify-content: center; height: 80%; text-align: center; color: var(--text-secondary); }
            .loading-view.active { display: flex; }
            .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(212,175,55,0.15); border-top-color: var(--gold-primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem; }
            @keyframes spin { to { transform: rotate(360deg); } }

            .detail-view { display: none; grid-template-columns: 1.25fr 0.75fr; gap: 2.5rem; align-items: start; animation: fadeIn 0.4s ease-out; margin-bottom: 2rem; }
            .detail-view.active { display: grid; }

            @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
            @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 25px rgba(212,175,55,0.35)); } }

            /* D&D Stat Block Card */
            .stat-block-card {
                background-color: var(--dnd-parchment);
                color: var(--dnd-text);
                padding: 1.8rem;
                border-radius: 6px;
                box-shadow: 0 15px 35px rgba(0,0,0,0.4), 0 5px 15px rgba(0,0,0,0.2);
                border: 1px solid var(--dnd-stat-border);
                border-top: 4px solid var(--dnd-accent);
                border-bottom: 4px solid var(--dnd-accent);
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 2rem;
                align-items: start;
            }
            .card-left-col, .card-right-col { display: flex; flex-direction: column; }
            .block-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.25rem; }
            .monster-name-title { font-family: 'Cinzel', serif; font-size: 2rem; font-weight: 700; color: var(--dnd-red); line-height: 1; text-transform: uppercase; letter-spacing: -0.5px; }
            .monster-subtitle { font-family: 'Outfit', sans-serif; font-style: italic; font-size: 0.9rem; color: #554433; margin-top: 0.3rem; display: block; }
            .info-line { margin-bottom: 0.25rem; font-size: 0.95rem; }
            .info-line strong { color: var(--dnd-red); font-weight: 700; }
            .dnd-divider { height: 4px; background: var(--dnd-accent); clip-path: polygon(0 40%, 50% 0, 100% 40%, 100% 60%, 50% 100%, 0 60%); margin: 0.8rem 0; border: none; width: 100%; }
            .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 0.5rem 0; }
            .stats-table { width: 100%; border-collapse: separate; border-spacing: 2px; }
            .stats-table th { color: #7a6e5d; font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.72rem; letter-spacing: 0.5px; padding: 0.1rem 0.2rem; text-align: center; }
            .stats-table td { padding: 0.35rem 0.4rem; text-align: center; font-size: 0.9rem; background-color: #f1ebd9; color: var(--dnd-text); border-radius: 2px; }
            .stats-table td.stat-name { font-weight: 700; color: var(--dnd-red); font-family: 'Cinzel', serif; background-color: transparent; border: none; text-align: left; padding-left: 0.15rem; font-size: 0.85rem; width: 38px; }
            .stats-table tr.headers-row th { border: none; background: transparent; }
            .block-list { margin: 0.4rem 0; font-size: 0.95rem; line-height: 1.45; }
            .block-list-item { margin-bottom: 0.35rem; }
            .block-list-item strong { color: var(--dnd-red); font-weight: 700; }
            .dnd-link { color: var(--dnd-red); text-decoration: underline; text-decoration-color: rgba(140,30,24,0.4); cursor: pointer; font-weight: 500; transition: color 0.2s ease; }
            .dnd-link:hover { color: #c92a21; }
            .block-section-title { font-family: 'Cinzel', serif; font-size: 1.1rem; font-weight: 700; color: var(--dnd-red); border-top: 1px solid var(--dnd-accent); padding-top: 0.4rem; margin-top: 1rem; margin-bottom: 0.6rem; letter-spacing: 1px; text-transform: uppercase; }
            .desc-block { margin-bottom: 0.8rem; font-size: 0.95rem; line-height: 1.5; }
            .desc-block-title { font-weight: 700; font-style: italic; }

            /* Monster Art Panel */
            .monster-art-panel { display: flex; flex-direction: column; align-items: center; position: sticky; top: 2.5rem; }
            .art-frame { width: 100%; border-radius: 8px; background: rgba(0,0,0,0.4); box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; }
            .art-frame:hover { box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
            .art-image { width: 100%; height: auto; display: block; border-radius: 8px; transition: transform 0.5s ease; }
            .art-frame:hover .art-image { transform: scale(1.02); }

            /* Group header in sidebar */
            .monster-group-header { font-family: 'Cinzel', serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; color: var(--gold-primary); text-transform: uppercase; padding: 0.6rem 0.5rem 0.2rem; opacity: 0.7; }

            .nav-creator-btn {
                display: flex; align-items: center; gap: 0.6rem;
                background: linear-gradient(135deg, rgba(212,175,55,0.1) 0%, rgba(212,175,55,0.05) 100%);
                border: 1px solid rgba(212,175,55,0.3);
                border-radius: 8px; padding: 0.75rem 1rem;
                color: var(--gold-secondary); font-family: 'Cinzel', serif;
                font-size: 0.85rem; font-weight: 700; letter-spacing: 1px;
                cursor: pointer; text-decoration: none;
                transition: all 0.3s ease; margin-bottom: 1.2rem; width: 100%;
                text-transform: uppercase;
            }
            .nav-creator-btn:hover {
                background: linear-gradient(135deg, rgba(212,175,55,0.2) 0%, rgba(212,175,55,0.1) 100%);
                border-color: var(--gold-primary);
                box-shadow: 0 0 12px rgba(212,175,55,0.15);
                transform: translateY(-1px);
            }
            .nav-creator-btn svg { width: 16px; height: 16px; fill: var(--gold-primary); flex-shrink: 0; }

            @media (max-width: 1100px) {
                .detail-view.active { grid-template-columns: 1fr; }
                .monster-art-panel { position: static; margin-top: 1rem; }
            }
            @media (max-width: 768px) {
                .app-container { flex-direction: column; height: auto; overflow: visible; }
                aside { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border-gold); padding: 1.5rem 1rem; }
                main { padding: 1.5rem 1rem; }
                .stat-block-card { grid-template-columns: 1fr; gap: 1.5rem; }
                .stats-container { grid-template-columns: 1fr; gap: 0.5rem; }
            }
        </style>
    </head>
    <body>
        <div class="app-container">
            <aside>
                <div class="sidebar-header">
                    <svg viewBox="0 0 24 24"><path d="M12 2c-5.52 0-10 4.48-10 10s4.48 10 10 10 10-4.48 10-10-4.48-10-10-10zm1 14h-2v-2h2v2zm0-4h-2V7h2v5z"/></svg>
                    <span class="sidebar-title">MONSTER CODEX</span>
                </div>
                <a href="Enemy_Creator.html" class="nav-creator-btn">
                    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    Enemy Creator
                </a>
                <div class="search-container">
                    <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input type="text" id="search-bar" class="search-input" placeholder="Cari monster...">
                </div>
                <div class="alphabet-strip" id="alphabet-filter"></div>
                <div class="monster-list-container" id="monster-list"></div>
            </aside>

            <main>
                <div class="codex-page-header" id="page-header" style="display: none;">
                    <h1 class="page-title" id="main-page-title">Monster</h1>
                    <div class="red-bar-divider"></div>
                </div>
                <div class="placeholder-view" id="empty-state">
                    <div class="placeholder-icon">📖</div>
                    <h2>Monster Codex Solythis</h2>
                    <p>Pilih salah satu monster dari direktori di sebelah kiri untuk menampilkan lembar statistik dan ilustrasi resminya.</p>
                </div>
                <div class="loading-view" id="loading-state">
                    <div class="loading-spinner"></div>
                    <p>Memuat data monster...</p>
                </div>
                <div class="detail-view" id="creature-detail">
                    <div class="stat-block-card" id="stat-card-content"></div>
                    <div class="monster-art-panel">
                        <div class="art-frame">
                            <img src="" alt="" class="art-image" id="monster-art-img">
                        </div>
                    </div>
                </div>
            </main>

        <script>
        // ============================================================
        // JSON PARSER: Converts raw JSON format to internal monstersDb
        // ============================================================

        // Image map: map monster name (lowercase) to local image path
        // Add more entries here as you add images to your Images/ folder
        const imageMap = {
            "skeleton": "Images/Skeleton.jpeg",
            "specter": "Images/Spectre.jpeg",
            "aboleth": "Images/Aboleth.png",
            "air elemental": "Images/airelemental.jpeg",
            "androsphinx": "Images/androsphinx.jpg",
            "animated armor": "Images/animatedarmor.jpg",
            "ankheg": "Images/ankheg.jpg",
            "azer": "Images/azer.png",
            
            // Example: "goblin": "Images/Goblin.jpeg",
        };

        // Parse a raw monster content array from JSON into the internal format
        function parseMonsterContent(name, contentArr) {
            const monster = {
                id: name.toLowerCase().replace(/[^a-z0-9]/g, '-'),
                name: name,
                sizeType: '',
                ac: '',
                initiative: '',
                hp: '',
                speed: '',
                attributes: {
                    str: { val: '-', mod: '-', save: '-' },
                    dex: { val: '-', mod: '-', save: '-' },
                    con: { val: '-', mod: '-', save: '-' },
                    int: { val: '-', mod: '-', save: '-' },
                    wis: { val: '-', mod: '-', save: '-' },
                    cha: { val: '-', mod: '-', save: '-' }
                },
                vulnerabilities: '',
                resistances: '',
                immunities: '',
                senses: '',
                languages: '',
                cr: '',
                gear: '',
                skills: '',
                savingThrows: '',
                traits: [],
                actions: [],
                reactions: [],
                legendaryActions: [],
                image: imageMap[name.toLowerCase()] || imageMap[name.toLowerCase().split(' ')[0]] || ''
            };

            let parsingSection = null; // 'actions', 'reactions', 'legendary'

            for (const entry of contentArr) {
                if (typeof entry === 'string') {
                    const s = entry.trim();

                    // Size/type line (italic markdown = first line)
                    if (s.startsWith('*') && !s.startsWith('**') && !s.startsWith('***') && monster.sizeType === '') {
                        monster.sizeType = s.replace(/\*/g, '').trim();
                        parsingSection = null;
                        continue;
                    }

                    // Section headers
                    if (s === '**Actions**') { parsingSection = 'actions'; continue; }
                    if (s === '**Reactions**') { parsingSection = 'reactions'; continue; }
                    if (s === '**Legendary Actions**' || s.startsWith('**Legendary Actions')) { parsingSection = 'legendary'; continue; }

                    // Key-value stats
                    const kvMatch = s.match(/^\*\*([^*]+)\*\*\s+(.*)/);
                    if (kvMatch) {
                        const key = kvMatch[1].trim();
                        const val = kvMatch[2].trim();
                        switch (key) {
                            case 'Armor Class': monster.ac = val; break;
                            case 'Hit Points': monster.hp = val; break;
                            case 'Speed': monster.speed = val; break;
                            case 'Saving Throws': monster.savingThrows = val; break;
                            case 'Skills': monster.skills = val; break;
                            case 'Damage Vulnerabilities': monster.vulnerabilities = val; break;
                            case 'Damage Resistances': monster.resistances = val; break;
                            case 'Damage Immunities':
                            case 'Condition Immunities':
                                monster.immunities = monster.immunities
                                    ? monster.immunities + '; ' + val
                                    : val;
                                break;
                            case 'Senses': monster.senses = val; break;
                            case 'Languages': monster.languages = val; break;
                            case 'Challenge': monster.cr = val; break;
                            case 'Gear': monster.gear = val; break;
                        }
                        parsingSection = null;
                        continue;
                    }

                    // Trait lines: ***Name.*** desc  or  ***Name.** desc*
                    const traitMatch = s.match(/^\*{3}([^*]+?)[\.\*]+\*{0,3}\s*(.*)/);
                    if (traitMatch && parsingSection !== 'actions' && parsingSection !== 'reactions' && parsingSection !== 'legendary') {
                        // Could be a trait if not inside actions section
                        const tname = traitMatch[1].replace(/\./g,'').trim();
                        const tdesc = mdToHtml(traitMatch[2] || '');
                        monster.traits.push({ name: tname, desc: tdesc });
                        continue;
                    }

                    // Action/reaction lines: ***Name.** Melee...* +X to hit ...
                    const actionMatch = s.match(/^\*{3}([^*]+?)[\.\*]{1,3}[\s\*]*(.*)/);
                    if (actionMatch) {
                        const aname = actionMatch[1].replace(/\./g,'').trim();
                        const adesc = mdToHtml(actionMatch[2] || '');
                        if (parsingSection === 'actions') {
                            monster.actions.push({ name: aname, desc: adesc });
                        } else if (parsingSection === 'reactions') {
                            monster.reactions.push({ name: aname, desc: adesc });
                        } else if (parsingSection === 'legendary') {
                            monster.legendaryActions.push({ name: aname, desc: adesc });
                        } else {
                            monster.traits.push({ name: aname, desc: adesc });
                        }
                        continue;
                    }

                    // Plain text after a section header = section description
                    // (e.g. legendary action intro text)

                } else if (typeof entry === 'object' && entry.table) {
                    // Stat table
                    const t = entry.table;
                    const statKeys = ['STR','DEX','CON','INT','WIS','CHA'];
                    const attrMap = { STR:'str', DEX:'dex', CON:'con', INT:'int', WIS:'wis', CHA:'cha' };
                    for (const sk of statKeys) {
                        if (t[sk] && t[sk][0]) {
                            const raw = t[sk][0]; // e.g. "10 (+0)" or "18 (+4)"
                            const m = raw.match(/(\d+)\s*\(([^)]+)\)/);
                            if (m) {
                                monster.attributes[attrMap[sk]].val = m[1];
                                monster.attributes[attrMap[sk]].mod = m[2];
                                monster.attributes[attrMap[sk]].save = m[2]; // default save = mod
                            }
                        }
                    }
                }
            }

            // Override saves from Saving Throws line if present
            if (monster.savingThrows) {
                const saveRegex = /(\w+)\s+([+-]\d+)/g;
                let sm;
                const saveMap = { Str:'str', Dex:'dex', Con:'con', Int:'int', Wis:'wis', Cha:'cha' };
                while ((sm = saveRegex.exec(monster.savingThrows)) !== null) {
                    const attr = saveMap[sm[1]];
                    if (attr) monster.attributes[attr].save = sm[2];
                }
            }

            return monster;
        }

        // Minimal markdown to HTML converter for inline text
        function mdToHtml(text) {
            return text
                .replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>');
        }

        // Flatten nested JSON structure to { id -> monsterData }
        function flattenMonstersJson(data) {
            const db = {};
            const monstersRoot = data['Monsters'];
            if (!monstersRoot) return db;

            for (const sectionKey of Object.keys(monstersRoot)) {
                if (!sectionKey.startsWith('Monsters (')) continue;
                const section = monstersRoot[sectionKey];

                for (const entryKey of Object.keys(section)) {
                    const entry = section[entryKey];

                    // Could be a single monster with direct 'content' array
                    if (entry.content && Array.isArray(entry.content)) {
                        const parsed = parseMonsterContent(entryKey, entry.content);
                        db[parsed.id] = parsed;
                    }
                    // Could be a group (like 'Angels', 'Skeletons') with sub-monsters
                    else if (typeof entry === 'object') {
                        for (const subKey of Object.keys(entry)) {
                            const sub = entry[subKey];
                            if (sub && sub.content && Array.isArray(sub.content)) {
                                const parsed = parseMonsterContent(subKey, sub.content);
                                db[parsed.id] = parsed;
                            }
                        }
                    }
                }
            }
            return db;
        }

        // ============================================================
        // APP STATE & DOM
        // ============================================================
        let monstersDb = {};
        let selectedMonsterId = null;
        let activeLetter = null;

        const searchBar = document.getElementById('search-bar');
        const alphabetContainer = document.getElementById('alphabet-filter');
        const monsterList = document.getElementById('monster-list');
        const emptyState = document.getElementById('empty-state');
        const loadingState = document.getElementById('loading-state');
        const detailView = document.getElementById('creature-detail');
        const statCardContent = document.getElementById('stat-card-content');
        const artImage = document.getElementById('monster-art-img');

        // ============================================================
        // LOAD JSON
        // ============================================================
        window.addEventListener('DOMContentLoaded', async () => {
            // Show loading state
            emptyState.style.display = 'none';
            loadingState.classList.add('active');

            try {
                const response = await fetch('11_monsters.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                monstersDb = flattenMonstersJson(data);
            } catch (err) {
                console.error('Gagal memuat JSON:', err);
                loadingState.classList.remove('active');
                emptyState.style.display = 'flex';
                emptyState.querySelector('p').textContent = 
                    'Gagal memuat file 11_monsters.json. Pastikan file berada di folder yang sama dengan HTML ini.';
                return;
            }

            loadingState.classList.remove('active');
            emptyState.style.display = 'flex';

            renderAlphabetFilter();
            filterMonsters();
            handleHashRoute();
        });

        window.addEventListener('hashchange', handleHashRoute);

        function handleHashRoute() {
            const hash = window.location.hash.substring(1).toLowerCase();
            if (hash && monstersDb[hash]) selectMonster(hash);
        }

        // ============================================================
        // SIDEBAR RENDERING
        // ============================================================
        function renderAlphabetFilter() {
            alphabetContainer.innerHTML = '';
            for (let i = 65; i <= 90; i++) {
                const letter = String.fromCharCode(i);
                const button = document.createElement('button');
                button.className = 'letter-btn';
                button.textContent = letter;
                button.addEventListener('click', () => toggleLetterFilter(letter));
                alphabetContainer.appendChild(button);
            }
        }

        function toggleLetterFilter(letter) {
            const buttons = document.querySelectorAll('.letter-btn');
            if (activeLetter === letter) {
                activeLetter = null;
                buttons.forEach(btn => btn.classList.remove('active'));
            } else {
                activeLetter = letter;
                buttons.forEach(btn => btn.classList.toggle('active', btn.textContent === letter));
            }
            filterMonsters();
        }

        searchBar.addEventListener('input', filterMonsters);

        function filterMonsters() {
            monsterList.innerHTML = '';
            const query = searchBar.value.toLowerCase().trim();

            const filtered = Object.values(monstersDb).filter(m => {
                const matchQ = m.name.toLowerCase().includes(query);
                const matchL = activeLetter ? m.name.toUpperCase().startsWith(activeLetter) : true;
                return matchQ && matchL;
            }).sort((a, b) => a.name.localeCompare(b.name));

            if (filtered.length === 0) {
                monsterList.innerHTML = '<div class="no-results">Tidak ada monster ditemukan</div>';
                return;
            }

            filtered.forEach(monster => {
                const item = document.createElement('div');
                item.className = 'monster-list-item' + (monster.id === selectedMonsterId ? ' active' : '');
                item.innerHTML = `
                    <span class="monster-item-name">${monster.name}</span>
                    <span class="monster-item-cr">CR ${monster.cr.split(' ')[0] || '?'}</span>
                `;
                item.addEventListener('click', () => { window.location.hash = monster.id; });
                monsterList.appendChild(item);
            });
        }

        // ============================================================
        // DETAIL VIEW RENDERING
        // ============================================================
        function selectMonster(id) {
            selectedMonsterId = id;
            filterMonsters();

            const monster = monstersDb[id];
            if (!monster) return;

            document.getElementById('page-header').style.display = 'block';
            document.getElementById('main-page-title').textContent = monster.name;
            emptyState.style.display = 'none';
            detailView.classList.add('active');

            const hasTraits = monster.traits && monster.traits.length > 0;

            const leftColHtml = `
                <div class="block-header">
                    <div>
                        <h2 class="monster-name-title">${monster.name}</h2>
                        <span class="monster-subtitle">${monster.sizeType}</span>
                    </div>
                </div>
                <div class="dnd-divider"></div>
                <div class="info-line"><strong>AC</strong> ${monster.ac}</div>
                ${monster.initiative ? `<div class="info-line"><strong>Initiative</strong> ${monster.initiative}</div>` : ''}
                <div class="info-line"><strong>HP</strong> ${monster.hp}</div>
                <div class="info-line"><strong>Speed</strong> ${monster.speed}</div>
                <div class="dnd-divider"></div>
                <div class="stats-container">
                    <table class="stats-table">
                        <thead><tr class="headers-row"><th></th><th></th><th>MOD</th><th>SAVE</th></tr></thead>
                        <tbody>
                            ${['str','dex','con'].map(s => `
                            <tr>
                                <td class="stat-name">${s.toUpperCase()}</td>
                                <td>${monster.attributes[s].val}</td>
                                <td>${monster.attributes[s].mod}</td>
                                <td>${monster.attributes[s].save}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                    <table class="stats-table">
                        <thead><tr class="headers-row"><th></th><th></th><th>MOD</th><th>SAVE</th></tr></thead>
                        <tbody>
                            ${['int','wis','cha'].map(s => `
                            <tr>
                                <td class="stat-name">${s.toUpperCase()}</td>
                                <td>${monster.attributes[s].val}</td>
                                <td>${monster.attributes[s].mod}</td>
                                <td>${monster.attributes[s].save}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
                <div class="dnd-divider"></div>
                <div class="block-list">
                    ${monster.savingThrows ? `<div class="block-list-item"><strong>Saving Throws</strong> ${monster.savingThrows}</div>` : ''}
                    ${monster.skills ? `<div class="block-list-item"><strong>Skills</strong> ${monster.skills}</div>` : ''}
                    ${monster.vulnerabilities ? `<div class="block-list-item"><strong>Vulnerabilities</strong> ${monster.vulnerabilities}</div>` : ''}
                    ${monster.resistances ? `<div class="block-list-item"><strong>Resistances</strong> ${monster.resistances}</div>` : ''}
                    ${monster.immunities ? `<div class="block-list-item"><strong>Immunities</strong> ${monster.immunities}</div>` : ''}
                    ${hasTraits ? `
                        ${monster.gear ? `<div class="block-list-item"><strong>Gear</strong> ${monster.gear}</div>` : ''}
                        <div class="block-list-item"><strong>Senses</strong> ${monster.senses}</div>
                        <div class="block-list-item"><strong>Languages</strong> ${monster.languages}</div>
                    ` : ''}
                </div>
            `;

            const rightColHtml = `
                <div class="block-list" style="margin-top:0;">
                    ${!hasTraits ? `
                        ${monster.gear ? `<div class="block-list-item"><strong>Gear</strong> ${monster.gear}</div>` : ''}
                        <div class="block-list-item"><strong>Senses</strong> ${monster.senses}</div>
                        <div class="block-list-item"><strong>Languages</strong> ${monster.languages}</div>
                    ` : ''}
                    <div class="block-list-item"><strong>CR</strong> ${monster.cr}</div>
                </div>
                ${hasTraits ? `
                    <h3 class="block-section-title">Traits</h3>
                    ${monster.traits.map(t => `
                        <div class="desc-block">
                            <span class="desc-block-title">${t.name}.</span> ${t.desc}
                        </div>
                    `).join('')}
                ` : ''}
                ${monster.actions.length > 0 ? `
                    <h3 class="block-section-title">Actions</h3>
                    ${monster.actions.map(a => `
                        <div class="desc-block">
                            <span class="desc-block-title">${a.name}.</span> ${a.desc}
                        </div>
                    `).join('')}
                ` : ''}
                ${monster.reactions.length > 0 ? `
                    <h3 class="block-section-title">Reactions</h3>
                    ${monster.reactions.map(r => `
                        <div class="desc-block">
                            <span class="desc-block-title">${r.name}.</span> ${r.desc}
                        </div>
                    `).join('')}
                ` : ''}
                ${monster.legendaryActions.length > 0 ? `
                    <h3 class="block-section-title">Legendary Actions</h3>
                    ${monster.legendaryActions.map(l => `
                        <div class="desc-block">
                            <span class="desc-block-title">${l.name}.</span> ${l.desc}
                        </div>
                    `).join('')}
                ` : ''}
            `;

            statCardContent.innerHTML = `
                <div class="card-left-col">${leftColHtml}</div>
                <div class="card-right-col">${rightColHtml}</div>
            `;

            artImage.src = monster.image;
            artImage.alt = monster.image ? `Ilustrasi ${monster.name}` : '';
            artImage.style.display = monster.image ? 'block' : 'none';
        }
        </script>
    </body>
    </html>
